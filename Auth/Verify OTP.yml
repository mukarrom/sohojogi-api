info:
  name: Verify OTP
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/otp/verify"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "mobile": "01512345678",
        "otp": "496684"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        let data = res.getBody();

        // if (data.data && data.data.accessToken) {
          bru.setEnvVar('accessToken', data.data.accessToken);
        // }
        // if (data.data && data.data.refreshToken) {
          bru.setEnvVar('refreshToken', data.data.refreshToken);
        // }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Verify OTP
    request:
      url: "{{baseUrl}}/auth/otp/verify"
      method: POST
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
