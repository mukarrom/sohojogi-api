info:
  name: Logout
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/auth/logout"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "refreshToken": "{{refreshToken}}"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

