info:
  name: Get Customer by ID (Admin)
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/customer/{{customerId}}"
  params:
    - name: customerId
      value: "{{customerId}}"
      type: path
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
