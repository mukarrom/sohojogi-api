info:
  name: List All Customers (Admin)
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/customer/all"
  params:
    - name: search
      value: ""
      type: query
      disabled: true
    - name: page
      value: "1"
      type: query
      disabled: true
    - name: limit
      value: "10"
      type: query
      disabled: true
    - name: sortBy
      value: createdAt
      type: query
      disabled: true
    - name: sortOrder
      value: desc
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
